<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse thousands of tech products from verified vendors. Filter by category, price, and rating.">
    <title>Products — NexMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .page-header { padding: 120px 0 40px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); }
        .filter-sidebar { position: sticky; top: 80px; }
        .filter-group { margin-bottom: 28px; }
        .filter-group h6 { font-weight: 700; font-size: 0.9rem; margin-bottom: 12px; color: var(--text-primary); }
        .filter-chip { display: inline-block; padding: 6px 16px; border-radius: var(--radius-full); background: var(--glass-bg); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.85rem; cursor: pointer; transition: all var(--transition-fast); margin: 0 6px 8px 0; }
        .filter-chip:hover, .filter-chip.active { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
        .price-range-display { font-size: 0.85rem; color: var(--accent-secondary); margin-top: 8px; }
        .sort-select { background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 0.85rem; }
        .sort-select:focus { border-color: var(--accent-primary); outline: none; }
        .pagination-custom .page-link { background: var(--bg-tertiary); border-color: var(--border-color); color: var(--text-secondary); }
        .pagination-custom .page-link:hover, .pagination-custom .page-item.active .page-link { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
        .search-box { position: relative; }
        .search-box input { width: 100%; background: var(--bg-tertiary); border: 1.5px solid var(--border-color); border-radius: var(--radius-full); padding: 12px 20px 12px 48px; color: var(--text-primary); font-size: 0.95rem; }
        .search-box input:focus { border-color: var(--accent-primary); outline: none; box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); }
        .results-info { font-size: 0.9rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <!-- Navbar (same as index) -->
    <nav class="navbar navbar-expand-lg navbar-custom" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">NexMart</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="bi bi-list fs-4"></i></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="cart.html" class="nav-link nav-icon-link" id="navCartLink"><i class="bi bi-bag"></i><span class="nav-badge" id="navCartCount" style="display:none;">0</span></a>
                    <div id="navAuthArea"><a href="login.html" class="btn nav-cta btn-sm">Sign In</a></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <div class="search-box mb-4" style="max-width:600px;">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search for laptops, phones, headphones...">
            </div>
            <h1 class="display-md" id="pageTitle">All Products</h1>
            <p class="results-info mt-2" id="resultsInfo">Showing all products</p>
        </div>
    </div>

    <!-- Main Content -->
    <section class="section" style="padding-top: 40px;">
        <div class="container">
            <div class="row">
                <!-- Sidebar Filters -->
                <div class="col-lg-3">
                    <div class="filter-sidebar">
                        <div class="filter-group">
                            <h6>Categories</h6>
                            <div id="categoryFilters">
                                <span class="filter-chip active" data-category="">All</span>
                                <span class="filter-chip" data-category="laptops">💻 Laptops</span>
                                <span class="filter-chip" data-category="smartphones">📱 Phones</span>
                                <span class="filter-chip" data-category="headphones">🎧 Audio</span>
                                <span class="filter-chip" data-category="accessories">⌨️ Accessories</span>
                                <span class="filter-chip" data-category="tablets">📱 Tablets</span>
                                <span class="filter-chip" data-category="smartwatches">⌚ Watches</span>
                                <span class="filter-chip" data-category="gaming">🎮 Gaming</span>
                            </div>
                        </div>
                        <div class="filter-group">
                            <h6>Price Range</h6>
                            <input type="range" class="form-range" id="priceRange" min="0" max="200000" step="1000" value="200000">
                            <div class="price-range-display">Up to ₹<span id="priceValue">2,00,000</span></div>
                        </div>
                        <div class="filter-group">
                            <h6>Sort By</h6>
                            <select class="sort-select w-100" id="sortSelect">
                                <option value="newest">Newest First</option>
                                <option value="price_asc">Price: Low to High</option>
                                <option value="price_desc">Price: High to Low</option>
                                <option value="rating">Highest Rated</option>
                            </select>
                        </div>
                        <button class="btn btn-ghost w-100 mt-2" onclick="resetFilters()">
                            <i class="bi bi-x-circle"></i> Reset Filters
                        </button>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="col-lg-9">
                    <div class="row g-4" id="productsGrid">
                        <div class="col-12 text-center py-5">
                            <div class="spinner mx-auto"></div>
                            <p class="text-muted mt-3">Loading products...</p>
                        </div>
                    </div>
                    <!-- Pagination -->
                    <nav class="mt-5 d-flex justify-content-center" id="paginationNav">
                    </nav>
                </div>
            </div>
        </div>
    </section>

    <!-- Chatbot Widget -->
    <div class="chatbot-fab"><button class="chatbot-toggle" id="chatbotToggle"><i class="bi bi-chat-dots"></i></button></div>
    <div class="chatbot-window" id="chatbotWindow">
        <div class="chatbot-header"><h6><span class="online-dot"></span> AI Shopping Assistant</h6><button class="btn-ghost btn-sm" id="chatbotClose" style="padding:4px 8px;font-size:1.2rem;"><i class="bi bi-x-lg"></i></button></div>
        <div class="chatbot-messages" id="chatbotMessages"><div class="chat-message bot">👋 Hi! Tell me what you're looking for!</div></div>
        <div class="chatbot-input"><input type="text" id="chatbotInput" placeholder="Ask me anything..." autocomplete="off"><button id="chatbotSend"><i class="bi bi-send"></i></button></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
        let currentFilters = { category: '', search: '', sort: 'newest', page: 1, max_price: '' };

        // Read URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('category')) {
            currentFilters.category = urlParams.get('category');
            document.querySelectorAll('.filter-chip').forEach(c => {
                c.classList.toggle('active', c.dataset.category === currentFilters.category);
            });
        }
        if (urlParams.get('search')) {
            currentFilters.search = urlParams.get('search');
            document.getElementById('searchInput').value = currentFilters.search;
        }

        // Category filter clicks
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilters.category = chip.dataset.category;
                currentFilters.page = 1;
                loadProducts();
            });
        });

        // Price range
        const priceRange = document.getElementById('priceRange');
        const priceValue = document.getElementById('priceValue');
        priceRange.addEventListener('input', () => {
            priceValue.textContent = parseInt(priceRange.value).toLocaleString('en-IN');
            currentFilters.max_price = priceRange.value == 200000 ? '' : priceRange.value;
        });
        priceRange.addEventListener('change', () => { currentFilters.page = 1; loadProducts(); });

        // Sort
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentFilters.sort = e.target.value;
            currentFilters.page = 1;
            loadProducts();
        });

        // Search
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentFilters.search = e.target.value;
                currentFilters.page = 1;
                loadProducts();
            }, 400);
        });

        function resetFilters() {
            currentFilters = { category: '', search: '', sort: 'newest', page: 1, max_price: '' };
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.category === ''));
            document.getElementById('searchInput').value = '';
            document.getElementById('sortSelect').value = 'newest';
            priceRange.value = 200000;
            priceValue.textContent = '2,00,000';
            loadProducts();
        }

        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner mx-auto"></div></div>';

            try {
                const params = { sort: currentFilters.sort, page: currentFilters.page, limit: 12 };
                if (currentFilters.category) params.category = currentFilters.category;
                if (currentFilters.search) params.search = currentFilters.search;
                if (currentFilters.max_price) params.max_price = currentFilters.max_price;

                const data = await ApiClient.getProducts(params);
                const { products, pagination } = data;

                document.getElementById('resultsInfo').textContent = `Showing ${products.length} of ${pagination.total} products`;
                document.getElementById('pageTitle').textContent = currentFilters.category
                    ? currentFilters.category.charAt(0).toUpperCase() + currentFilters.category.slice(1)
                    : currentFilters.search ? `Results for "${currentFilters.search}"` : 'All Products';

                if (products.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center py-5"><i class="bi bi-emoji-frown" style="font-size:3rem;color:var(--text-tertiary)"></i><p class="text-muted mt-3">No products found matching your criteria.</p></div>';
                    document.getElementById('paginationNav').innerHTML = '';
                    return;
                }

                grid.innerHTML = products.map(p => createProductCard(p)).join('');

                // Make product cards visible — force visibility immediately
                // since IntersectionObserver may not trigger for elements already in viewport
                const cards = grid.querySelectorAll('.animate-on-scroll');
                cards.forEach((el, index) => {
                    // Stagger entrance animation
                    setTimeout(() => {
                        el.classList.add('visible');
                    }, index * 60);
                    scrollObserver.observe(el);
                });

                // Pagination
                if (pagination.pages > 1) {
                    let pagHtml = '<ul class="pagination pagination-custom">';
                    for (let i = 1; i <= pagination.pages; i++) {
                        pagHtml += `<li class="page-item ${i === pagination.page ? 'active' : ''}"><a class="page-link" href="#" onclick="goToPage(${i});return false;">${i}</a></li>`;
                    }
                    pagHtml += '</ul>';
                    document.getElementById('paginationNav').innerHTML = pagHtml;
                } else {
                    document.getElementById('paginationNav').innerHTML = '';
                }
            } catch (error) {
                grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">Failed to load products. Is the server running?</p><button class="btn btn-ghost btn-sm mt-2" onclick="loadProducts()"><i class="bi bi-arrow-clockwise"></i> Retry</button></div>';
            }
        }

        function goToPage(page) { currentFilters.page = page; loadProducts(); window.scrollTo({ top: 200, behavior: 'smooth' }); }

        loadProducts();
    </script>
</body>
</html>
