<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail — NexMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .product-detail { padding: 120px 0 80px; }
        .product-gallery { background: var(--bg-tertiary); border-radius: var(--radius-xl); overflow: hidden; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
        .product-gallery img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding-left: 40px; }
        .product-info .category { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-secondary); }
        .product-info .title { font-size: 2rem; font-weight: 800; margin: 8px 0 12px; line-height: 1.2; }
        .product-info .vendor-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--glass-bg); padding: 6px 14px; border-radius: var(--radius-full); font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 20px; }
        .product-info .vendor-badge .verified { color: var(--accent-success); }
        .price-block { margin: 24px 0; }
        .price-block .current-price { font-size: 2.5rem; font-weight: 900; }
        .price-block .original-price { font-size: 1.2rem; color: var(--text-tertiary); text-decoration: line-through; margin-left: 12px; }
        .price-block .discount-badge { background: var(--accent-success); color: white; padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.85rem; font-weight: 700; margin-left: 12px; }
        .rating-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .rating-row .stars { color: var(--accent-warning); font-size: 1.1rem; }
        .rating-row .count { color: var(--text-tertiary); font-size: 0.9rem; }
        .feature-list { list-style: none; padding: 0; }
        .feature-list li { padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }
        .feature-list li i { color: var(--accent-success); }
        .quantity-control { display: flex; align-items: center; gap: 0; border: 1px solid var(--border-color); border-radius: var(--radius-sm); overflow: hidden; width: fit-content; }
        .quantity-control button { background: var(--bg-tertiary); border: none; color: var(--text-primary); width: 44px; height: 44px; cursor: pointer; font-size: 1.2rem; }
        .quantity-control button:hover { background: var(--bg-card); }
        .quantity-control .qty { width: 60px; text-align: center; background: var(--bg-primary); border: none; color: var(--text-primary); font-size: 1rem; font-weight: 600; height: 44px; }
        .add-to-cart-row { display: flex; gap: 12px; margin-top: 24px; }
        .stock-status { font-size: 0.9rem; margin-top: 12px; }
        .stock-status.in-stock { color: var(--accent-success); }
        .stock-status.low-stock { color: var(--accent-warning); }
        .stock-status.out-of-stock { color: var(--accent-danger); }
        .review-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; }
        .review-card .reviewer { font-weight: 600; font-size: 0.95rem; }
        .review-card .review-date { font-size: 0.8rem; color: var(--text-tertiary); }
        .review-card .review-stars { color: var(--accent-warning); font-size: 0.9rem; }
        .review-card .review-text { color: var(--text-secondary); margin-top: 8px; font-size: 0.9rem; }
        @media (max-width: 768px) { .product-info { padding-left: 0; margin-top: 24px; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">NexMart</a>
            <div class="d-flex align-items-center gap-3">
                <a href="cart.html" class="nav-link nav-icon-link"><i class="bi bi-bag"></i><span class="nav-badge" id="navCartCount" style="display:none;">0</span></a>
                <div id="navAuthArea"><a href="login.html" class="btn nav-cta btn-sm">Sign In</a></div>
            </div>
        </div>
    </nav>

    <section class="product-detail">
        <div class="container" id="productContainer">
            <div class="text-center py-5"><div class="spinner mx-auto"></div></div>
        </div>
    </section>

    <!-- Reviews Section -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <h3 class="display-md mb-4" id="reviewsTitle" style="display:none;">Customer Reviews</h3>
            <div id="reviewsContainer"></div>
            <div id="addReviewForm" style="display:none;">
                <div class="glass-card mt-4" style="max-width:600px;">
                    <h5 class="mb-3">Write a Review</h5>
                    <div class="mb-3">
                        <label class="form-label-dark">Rating</label>
                        <select class="form-select-dark" id="reviewRating"><option value="5">⭐⭐⭐⭐⭐ Excellent</option><option value="4">⭐⭐⭐⭐ Good</option><option value="3">⭐⭐⭐ Average</option><option value="2">⭐⭐ Poor</option><option value="1">⭐ Terrible</option></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-dark">Comment</label>
                        <textarea class="form-control-dark" id="reviewComment" rows="3" placeholder="Share your experience..."></textarea>
                    </div>
                    <button class="btn btn-primary-custom" onclick="submitReview()">Submit Review</button>
                </div>
            </div>
        </div>
    </section>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentProduct = null;
        let quantity = 1;
        const productId = new URLSearchParams(window.location.search).get('id');

        async function loadProduct() {
            if (!productId) { window.location.href = 'products.html'; return; }
            try {
                const product = await ApiClient.getProduct(productId);
                currentProduct = product;
                document.title = `${product.name} — NexMart`;

                const discount = product.compare_price ? Math.round((1 - product.price / product.compare_price) * 100) : 0;
                const stars = '★'.repeat(Math.floor(product.rating || 0)) + '☆'.repeat(5 - Math.floor(product.rating || 0));
                const imageUrl = product.image && !product.image.includes('undefined') ? product.image : `https://placehold.co/600x600/1c1c1e/6e6e73?text=${encodeURIComponent(product.name?.substring(0, 20))}`;
                const stockClass = product.stock > 10 ? 'in-stock' : product.stock > 0 ? 'low-stock' : 'out-of-stock';
                const stockText = product.stock > 10 ? `In Stock (${product.stock} available)` : product.stock > 0 ? `Only ${product.stock} left!` : 'Out of Stock';

                const features = product.features || [];

                document.getElementById('productContainer').innerHTML = `
                    <nav aria-label="breadcrumb" style="margin-bottom:24px;"><ol class="breadcrumb" style="font-size:0.85rem;">
                        <li class="breadcrumb-item"><a href="index.html" style="color:var(--text-tertiary);">Home</a></li>
                        <li class="breadcrumb-item"><a href="products.html" style="color:var(--text-tertiary);">Products</a></li>
                        <li class="breadcrumb-item"><a href="products.html?category=${product.category_name?.toLowerCase() || ''}" style="color:var(--text-tertiary);">${product.category_name || 'Category'}</a></li>
                        <li class="breadcrumb-item active" style="color:var(--text-secondary);">${product.name}</li>
                    </ol></nav>
                    <div class="row">
                        <div class="col-lg-6">
                            <div class="product-gallery">
                                <img src="${imageUrl}" alt="${product.name}" onerror="this.src='https://placehold.co/600x600/1c1c1e/6e6e73?text=Product'">
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="product-info">
                                <div class="category">${product.category_name || 'Tech'}</div>
                                <h1 class="title">${product.name}</h1>
                                <div class="vendor-badge">
                                    <i class="bi bi-shop"></i> ${product.store_name || 'Vendor'}
                                    ${product.is_verified ? '<i class="bi bi-patch-check-fill verified"></i>' : ''}
                                </div>
                                <div class="rating-row">
                                    <span class="stars">${stars}</span>
                                    <span class="count">${product.rating || 0} (${product.review_count || 0} reviews)</span>
                                </div>
                                <div class="price-block">
                                    <span class="current-price">₹${formatPrice(product.price)}</span>
                                    ${product.compare_price ? `<span class="original-price">₹${formatPrice(product.compare_price)}</span>` : ''}
                                    ${discount > 0 ? `<span class="discount-badge">${discount}% OFF</span>` : ''}
                                </div>
                                <p style="color:var(--text-secondary);line-height:1.8;margin-bottom:24px;">${product.description || ''}</p>
                                ${features.length > 0 ? `<h6 style="font-weight:700;margin-bottom:12px;">Key Features</h6><ul class="feature-list">${features.map(f => `<li><i class="bi bi-check-circle-fill"></i> ${f}</li>`).join('')}</ul>` : ''}
                                <div class="stock-status ${stockClass} mt-3"><i class="bi bi-${stockClass === 'out-of-stock' ? 'x-circle' : 'check-circle'}"></i> ${stockText}</div>
                                ${product.stock > 0 ? `
                                <div class="add-to-cart-row">
                                    <div class="quantity-control">
                                        <button onclick="changeQty(-1)">−</button>
                                        <input type="number" class="qty" id="qtyInput" value="1" min="1" max="${product.stock}">
                                        <button onclick="changeQty(1)">+</button>
                                    </div>
                                    <button class="btn btn-gradient flex-grow-1" onclick="addToCartDetail()">
                                        <i class="bi bi-bag-plus"></i> Add to Cart
                                    </button>
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                loadReviews();
            } catch (error) {
                document.getElementById('productContainer').innerHTML = '<div class="text-center py-5"><h3 class="text-muted">Product not found</h3><a href="products.html" class="btn btn-ghost mt-3">Browse Products</a></div>';
            }
        }

        function changeQty(delta) {
            const input = document.getElementById('qtyInput');
            let val = parseInt(input.value) + delta;
            val = Math.max(1, Math.min(val, currentProduct.stock));
            input.value = val;
            quantity = val;
        }

        async function addToCartDetail() {
            if (!ApiClient.isLoggedIn()) { showToast('Please sign in first.', 'warning'); setTimeout(() => window.location.href = 'login.html', 1500); return; }
            try {
                await ApiClient.addToCart(currentProduct.id, quantity);
                showToast('Added to cart!', 'success');
                updateCartBadge();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function loadReviews() {
            try {
                const data = await ApiClient.getReviews(productId);
                if (data.reviews && data.reviews.length > 0) {
                    document.getElementById('reviewsTitle').style.display = 'block';
                    document.getElementById('reviewsContainer').innerHTML = data.reviews.map(r => `
                        <div class="review-card">
                            <div class="d-flex justify-content-between"><span class="reviewer">${r.user_name}</span><span class="review-date">${new Date(r.created_at).toLocaleDateString()}</span></div>
                            <div class="review-stars mt-1">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                            ${r.comment ? `<p class="review-text">${r.comment}</p>` : ''}
                        </div>
                    `).join('');
                }
                if (ApiClient.isLoggedIn()) { document.getElementById('addReviewForm').style.display = 'block'; }
            } catch (e) {}
        }

        async function submitReview() {
            try {
                const rating = parseInt(document.getElementById('reviewRating').value);
                const comment = document.getElementById('reviewComment').value;
                await ApiClient.addReview(parseInt(productId), rating, comment);
                showToast('Review submitted!', 'success');
                loadReviews();
                document.getElementById('reviewComment').value = '';
            } catch (err) { showToast(err.message, 'error'); }
        }

        loadProduct();
    </script>
</body>
</html>
