<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — NexMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .checkout-page { padding: 120px 0 80px; min-height: 80vh; }
        .checkout-form { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 32px; }
        .checkout-form h4 { font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .checkout-form h4 .step-num { width: 32px; height: 32px; background: var(--accent-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; }
        .order-summary-checkout { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 32px; position: sticky; top: 80px; }
        .order-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .order-item:last-child { border: none; }
        .order-item .oi-name { font-size: 0.9rem; flex: 1; }
        .order-item .oi-qty { color: var(--text-tertiary); font-size: 0.85rem; }
        .order-item .oi-price { font-weight: 600; }
        #card-element { background: var(--bg-primary); border: 1.5px solid var(--border-color); border-radius: var(--radius-md); padding: 14px 18px; }
        .payment-icons { display: flex; gap: 8px; margin-top: 8px; }
        .payment-icons i { font-size: 1.8rem; color: var(--text-tertiary); }
        .success-screen { text-align: center; padding: 80px 0; }
        .success-screen .check-icon { width: 100px; height: 100px; background: var(--accent-success); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; margin: 0 auto 24px; animation: scaleIn 0.5s ease; }
        .coupon-auto-fill { background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); border-radius: 8px; padding: 12px 16px; margin-top: 12px; display: none; font-size: 0.85rem; color: #4ade80; }
        .coupon-auto-fill i { margin-right: 6px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">NexMart</a>
            <a href="cart.html" class="nav-link"><i class="bi bi-arrow-left"></i> Back to Cart</a>
        </div>
    </nav>

    <section class="checkout-page">
        <div class="container">
            <h1 class="display-md mb-4"><i class="bi bi-lock"></i> Checkout</h1>
            <div id="checkoutContent">
                <div class="row g-4">
                    <div class="col-lg-8">
                        <!-- Shipping -->
                        <div class="checkout-form mb-4">
                            <h4><span class="step-num">1</span> Shipping Information</h4>
                            <div class="row g-3">
                                <div class="col-md-6"><input class="form-control-dark w-100" id="shipName" placeholder="Full Name" required></div>
                                <div class="col-md-6"><input class="form-control-dark w-100" id="shipPhone" placeholder="Phone Number" required></div>
                                <div class="col-12"><input class="form-control-dark w-100" id="shipAddress" placeholder="Street Address" required></div>
                                <div class="col-md-4"><input class="form-control-dark w-100" id="shipCity" placeholder="City" required></div>
                                <div class="col-md-4"><input class="form-control-dark w-100" id="shipState" placeholder="State" required></div>
                                <div class="col-md-4"><input class="form-control-dark w-100" id="shipZip" placeholder="PIN Code" required></div>
                            </div>
                        </div>
                        <!-- Coupon -->
                        <div class="checkout-form mb-4">
                            <h4><span class="step-num">2</span> Coupon Code (Optional)</h4>
                            <div class="d-flex gap-2">
                                <input class="form-control-dark flex-1" id="couponCode" placeholder="Enter coupon code" style="flex:1;">
                                <button class="btn btn-ghost" onclick="applyCoupon()" id="applyCouponBtn">Apply</button>
                            </div>
                            <div id="couponMessage" class="mt-2" style="font-size:0.85rem;"></div>
                            <div class="coupon-auto-fill" id="couponAutoFill">
                                <i class="bi bi-gift"></i>
                                <span>You have a coupon! Click <strong>"Apply"</strong> to save 10%</span>
                            </div>
                        </div>
                        <!-- Payment -->
                        <div class="checkout-form">
                            <h4><span class="step-num">3</span> Payment</h4>
                            <div id="card-element">
                                <p style="color:var(--text-tertiary);font-size:0.9rem;"><i class="bi bi-credit-card"></i> Razorpay payment will be initialized when you click "Pay Now"</p>
                            </div>
                            <div class="payment-icons mt-3">
                                <span style="font-size:0.85rem;color:var(--text-tertiary);"><i class="bi bi-shield-lock"></i> Secured by Razorpay</span>
                            </div>
                            <div id="card-errors" style="color: var(--accent-danger); margin-top: 8px; font-size: 0.85rem;"></div>
                            <button class="btn btn-gradient w-100 mt-4" id="payButton" onclick="processPayment()" style="padding: 16px; font-size: 1.1rem;">
                                <i class="bi bi-lock"></i> Pay Now
                            </button>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="order-summary-checkout">
                            <h4 style="font-weight:700;">Order Summary</h4>
                            <div id="orderItems"><div class="spinner spinner-sm mx-auto"></div></div>
                            <div id="discountRow" class="summary-row" style="display:none;padding:8px 0;border-bottom:1px solid var(--border-color);">
                                <span>Discount</span><span id="orderDiscount">-₹0</span>
                            </div>
                            <div class="summary-row total mt-3" style="display:flex;justify-content:space-between;font-weight:800;font-size:1.2rem;border-top:2px solid var(--border-color);padding-top:16px;">
                                <span>Total</span><span id="orderTotal">₹0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadOrderSummary() {
            if (!ApiClient.isLoggedIn()) { window.location.href = 'login.html'; return; }
            try {
                const cart = await ApiClient.getCart();
                if (!cart.items || cart.items.length === 0) { window.location.href = 'cart.html'; return; }
                document.getElementById('orderItems').innerHTML = cart.items.map(i => `
                    <div class="order-item">
                        <span class="oi-name">${i.name} <span class="oi-qty">×${i.quantity}</span></span>
                        <span class="oi-price">₹${formatPrice(i.price * i.quantity)}</span>
                    </div>
                `).join('');
                document.getElementById('orderTotal').textContent = `₹${formatPrice(cart.subtotal)}`;
                window.currentTotal = cart.subtotal;
                window.appliedCoupon = null;
                document.getElementById('discountRow').style.display = 'none';

                // Auto-fill coupon code from user data
                const user = ApiClient.getUser();
                if (user && user.coupon_code) {
                    const couponInput = document.getElementById('couponCode');
                    couponInput.value = user.coupon_code;
                    const autoFill = document.getElementById('couponAutoFill');
                    autoFill.style.display = 'block';
                }
            } catch (err) {
                console.error('Failed to load cart:', err);
                showToast('Failed to load cart. Please try again.', 'error');
            }
        }

        async function applyCoupon() {
            const couponCode = document.getElementById('couponCode').value.trim().toUpperCase();
            if (!couponCode) {
                showToast('Please enter a coupon code.', 'error');
                return;
            }

            const btn = document.getElementById('applyCouponBtn');
            btn.disabled = true;
            btn.textContent = 'Applying...';

            try {
                // Test coupon by creating order with coupon
                const orderData = await ApiClient.request('/payment/create-order', {
                    method: 'POST',
                    body: { couponCode },
                });

                if (orderData.discount > 0) {
                    document.getElementById('discountRow').style.display = 'flex';
                    document.getElementById('orderDiscount').textContent = `-₹${formatPrice(orderData.discount)}`;
                    document.getElementById('orderTotal').textContent = `₹${formatPrice(orderData.amount)}`;
                    document.getElementById('couponMessage').innerHTML = '<span style="color:var(--accent-success);"><i class="bi bi-check-circle"></i> Coupon applied successfully! You save ₹' + formatPrice(orderData.discount) + '</span>';
                    window.appliedCoupon = couponCode;
                    window.currentTotal = orderData.amount;
                    // Hide auto-fill hint
                    document.getElementById('couponAutoFill').style.display = 'none';
                } else {
                    document.getElementById('couponMessage').innerHTML = '<span style="color:var(--accent-danger);"><i class="bi bi-x-circle"></i> Invalid coupon code.</span>';
                }
            } catch (e) {
                document.getElementById('couponMessage').innerHTML = '<span style="color:var(--accent-danger);"><i class="bi bi-x-circle"></i> Failed to apply coupon.</span>';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Apply';
            }
        }

        async function processPayment() {
            const btn = document.getElementById('payButton');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner spinner-sm" style="display:inline-block;vertical-align:middle;margin-right:8px;"></span> Processing...';

            try {
                const shipping = {
                    name: document.getElementById('shipName').value,
                    phone: document.getElementById('shipPhone').value,
                    address: document.getElementById('shipAddress').value,
                    city: document.getElementById('shipCity').value,
                    state: document.getElementById('shipState').value,
                    zip: document.getElementById('shipZip').value,
                };

                if (!shipping.name || !shipping.address || !shipping.city) {
                    throw new Error('Please fill in all shipping details.');
                }

                // Create Razorpay order
                const orderData = await ApiClient.request('/payment/create-order', {
                    method: 'POST',
                    body: { couponCode: window.appliedCoupon },
                });

                const handleSuccess = (result) => {
                    document.getElementById('checkoutContent').innerHTML = `
                        <div class="success-screen">
                            <div class="check-icon"><i class="bi bi-check-lg"></i></div>
                            <h2 class="display-md mb-3">Order Placed Successfully!</h2>
                            <p class="text-muted mb-1">Order #${result.orderId}</p>
                            <p class="text-muted mb-4">Thank you for your purchase. You'll receive a confirmation email shortly.</p>
                            <div class="d-flex gap-3 justify-content-center">
                                <a href="orders.html" class="btn btn-primary-custom"><i class="bi bi-box-seam"></i> View Orders</a>
                                <a href="products.html" class="btn btn-ghost">Continue Shopping</a>
                            </div>
                        </div>`;
                    updateCartBadge();
                };

                if (orderData.isMock) {
                    showToast('Razorpay keys not configured. Using Mock Payment flow.', 'success');
                    try {
                        const verifyData = {
                            razorpay_order_id: orderData.orderId,
                            razorpay_payment_id: 'mock_payment_' + Date.now(),
                            razorpay_signature: 'mock_signature',
                            shipping: shipping,
                        };

                        const result = await ApiClient.request('/payment/verify', {
                            method: 'POST',
                            body: verifyData,
                        });
                        
                        handleSuccess(result);
                    } catch (verifyError) {
                        showToast('Payment verification failed. Please contact support.', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="bi bi-lock"></i> Pay Now';
                    }
                    return;
                }

                // Initialize Razorpay
                const options = {
                    key: orderData.keyId,
                    amount: orderData.amountInPaise,
                    currency: orderData.currency,
                    name: 'NexMart',
                    description: 'Purchase from NexMart',
                    order_id: orderData.orderId,
                    handler: async function (response) {
                        // Payment successful, verify on backend
                        try {
                            const verifyData = {
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                shipping: shipping,
                            };

                            const result = await ApiClient.request('/payment/verify', {
                                method: 'POST',
                                body: verifyData,
                            });

                            handleSuccess(result);
                        } catch (verifyError) {
                            showToast('Payment verification failed. Please contact support.', 'error');
                            btn.disabled = false;
                            btn.innerHTML = '<i class="bi bi-lock"></i> Pay Now';
                        }
                    },
                    prefill: {
                        name: shipping.name,
                        email: ApiClient.getUser()?.email,
                        contact: shipping.phone,
                    },
                    theme: {
                        color: '#DB1A1A',
                    },
                };

                const rzp = new Razorpay(options);
                rzp.open();

                // Re-enable button if payment window is closed without payment
                rzp.on('payment.failed', function (response) {
                    showToast('Payment failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-lock"></i> Pay Now';
                });

            } catch (err) {
                showToast(err.message || 'Payment failed. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-lock"></i> Pay Now';
            }
        }

        // Initialize
        loadOrderSummary();
    </script>
</body>
</html>
