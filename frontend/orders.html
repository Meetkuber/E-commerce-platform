<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — NexMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .orders-page { padding: 120px 0 80px; min-height: 80vh; }
        .order-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; transition: all var(--transition-fast); }
        .order-card:hover { border-color: var(--border-color-hover); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .order-id { font-weight: 700; font-size: 1.05rem; }
        .order-date { font-size: 0.85rem; color: var(--text-tertiary); }
        .order-status { padding: 4px 14px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 600; }
        .order-status.pending { background: rgba(255,214,10,0.15); color: var(--accent-warning); }
        .order-status.paid, .order-status.processing { background: rgba(48,209,88,0.15); color: var(--accent-success); }
        .order-status.shipped { background: rgba(219,26,26,0.15); /* new css - Red tinted background */ color: var(--accent-primary); /* new css - Red text */ }
        .order-status.delivered { background: rgba(48,209,88,0.3); color: var(--accent-success); }
        .order-status.cancelled { background: rgba(255,69,58,0.15); color: var(--accent-danger); }
        .order-total { font-size: 1.3rem; font-weight: 800; }
        .order-items { font-size: 0.9rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">NexMart</a>
            <div class="d-flex align-items-center gap-3">
                <a href="products.html" class="nav-link"><i class="bi bi-bag-heart"></i> Shop</a>
                <div id="navAuthArea"><a href="login.html" class="btn nav-cta btn-sm">Sign In</a></div>
            </div>
        </div>
    </nav>

    <section class="orders-page">
        <div class="container" style="max-width:800px;">
            <h1 class="display-md mb-4"><i class="bi bi-box-seam"></i> My Orders</h1>
            <div id="ordersList">
                <div class="text-center py-5"><div class="spinner mx-auto"></div></div>
            </div>
        </div>
    </section>
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadOrders() {
            if (!ApiClient.isLoggedIn()) { window.location.href = 'login.html'; return; }
            try {
                const orders = await ApiClient.getOrders();
                if (!orders || orders.length === 0) {
                    document.getElementById('ordersList').innerHTML = '<div class="text-center py-3"><i class="bi bi-box-seam" style="font-size:3rem;color:var(--text-tertiary);"></i><h3 class="mt-3" style="font-weight:500;">No orders yet</h3><p class="text-muted">Your order history will appear here.</p><a href="products.html" class="btn btn-gradient mt-2">Start Shopping</a></div>';
                    return;
                }
                document.getElementById('ordersList').innerHTML = orders.map(o => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">Order #${o.id}</span>
                                <span class="order-date ms-3">${new Date(o.created_at).toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' })}</span>
                            </div>
                            <span class="order-status ${o.status}">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="order-items">${o.item_count} item${o.item_count > 1 ? 's' : ''}</span>
                            <span class="order-total">₹${formatPrice(o.total)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('ordersList').innerHTML = '<p class="text-muted text-center py-5">Failed to load orders.</p>';
            }
        }
        loadOrders();
    </script>
</body>
</html>
