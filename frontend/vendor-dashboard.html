<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard — NexMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .dashboard {
            padding: 80px 0 40px;
            min-height: 100vh;
        }

        .dash-sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            min-height: calc(100vh - 80px);
            padding: 24px 16px;
            position: fixed;
            left: 0;
            top: 56px;
            width: 240px;
            z-index: 10;
        }

        .dash-content {
            margin-left: 240px;
            padding: 24px 32px;
        }

        .dash-nav {
            list-style: none;
            padding: 0;
        }

        .dash-nav li {
            margin-bottom: 4px;
        }

        .dash-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .dash-nav a:hover,
        .dash-nav a.active {
            background: var(--glass-bg);
            color: var(--text-primary);
        }

        .dash-nav a.active {
            background: rgba(219, 26, 26, 0.15); /* new css - Red tinted background */
            color: var(--accent-primary); /* new css - Red text */
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .stat-card .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 12px;
        }

        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .dash-section {
            display: none;
        }

        .dash-section.active {
            display: block;
        }

        .dash-table {
            width: 100%;
            border-collapse: collapse;
        }

        .dash-table th {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .dash-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .dash-table tr:hover {
            background: var(--glass-bg);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-badge.pending {
            background: rgba(255, 214, 10, 0.15);
            color: var(--accent-warning);
        }

        .status-badge.paid {
            background: rgba(48, 209, 88, 0.15);
            color: var(--accent-success);
        }

        .status-badge.shipped {
            background: rgba(219, 26, 26, 0.15); /* new css - Red tinted background */
            color: var(--accent-primary); /* new css - Red text */
        }

        .add-product-form {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 32px;
            max-width: 700px;
        }

        @media (max-width: 768px) {
            .dash-sidebar {
                display: none;
            }

            .dash-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom" id="mainNavbar" style="padding:8px 0;">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="index.html">NexMart</a>
            <div class="d-flex align-items-center gap-3">
                <a href="index.html" class="nav-link" style="font-size:0.85rem;"><i class="bi bi-house"></i>
                    Storefront</a>
                <div id="navAuthArea"><a href="login.html" class="btn nav-cta btn-sm">Sign In</a></div>
            </div>
        </div>
    </nav>

    <div class="dash-sidebar">
        <ul class="dash-nav">
            <li><a href="#" class="active" onclick="showSection('overview', this)"><i class="bi bi-speedometer2"></i>
                    Overview</a></li>
            <li><a href="#" onclick="showSection('my-products', this)"><i class="bi bi-box-seam"></i> My Products</a></li>
            <li><a href="#" onclick="showSection('add-product', this)"><i class="bi bi-plus-circle"></i> Add Product</a>
            </li>
            <li><a href="#" onclick="showSection('orders', this)"><i class="bi bi-receipt"></i> Orders</a></li>
        </ul>
    </div>

    <div class="dash-content" style="padding-top: 80px;">
        <!-- Overview -->
        <div class="dash-section active" id="sec-overview">
            <h2 style="font-weight:800;margin-bottom:24px;">Dashboard</h2>
            <div class="stat-cards" id="statCards">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(219,26,26,0.15);color:var(--accent-primary);"><i /* new css - Red tinted background and red text */
                            class="bi bi-currency-rupee"></i></div>
                    <div class="stat-value" id="totalRevenue">₹0</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(48,209,88,0.15);color:var(--accent-success);"><i
                            class="bi bi-receipt"></i></div>
                    <div class="stat-value" id="totalOrders">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(219,26,26,0.15);color:#DB1A1A;"><i /* new css - Red tinted background and red text */
                            class="bi bi-box-seam"></i></div>
                    <div class="stat-value" id="totalProducts">0</div>
                    <div class="stat-label">My Products</div>
                </div>
            </div>
            <div class="glass-card">
                <h5 style="font-weight:700;margin-bottom:16px;">Recent Orders</h5>
                <div id="recentOrdersList">
                    <p class="text-muted">Loading...</p>
                </div>
            </div>
        </div>

        <!-- My Products (vendor's own products only) -->
        <div class="dash-section" id="sec-my-products">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="font-weight:800;">My Products</h2>
                <button class="btn btn-primary-custom btn-sm"
                    onclick="showSection('add-product', document.querySelector('.dash-nav a:nth-child(3)'))"><i
                        class="bi bi-plus"></i> Add Product</button>
            </div>
            <div id="vendorProducts">
                <p class="text-muted">Loading...</p>
            </div>
        </div>

        <!-- Add Product -->
        <div class="dash-section" id="sec-add-product">
            <h2 style="font-weight:800;margin-bottom:24px;">Add New Product</h2>
            <div class="add-product-form">
                <div class="row g-3">
                    <div class="col-12"><label class="form-label-dark">Product Name</label><input
                            class="form-control-dark w-100" id="apName" placeholder="e.g., MacBook Pro 15'"></div>
                    <div class="col-md-6"><label class="form-label-dark">Price (₹)</label><input type="number"
                            class="form-control-dark w-100" id="apPrice" placeholder="129999"></div>
                    <div class="col-md-6"><label class="form-label-dark">Compare Price (₹)</label><input type="number"
                            class="form-control-dark w-100" id="apComparePrice" placeholder="149999"></div>
                    <div class="col-md-6"><label class="form-label-dark">Category</label>
                        <select class="form-control-dark w-100" id="apCategory">
                            <option value="">Select Category</option>
                            <option value="1">Laptops</option>
                            <option value="2">Smartphones</option>
                            <option value="3">Headphones</option>
                            <option value="4">Accessories</option>
                            <option value="5">Tablets</option>
                            <option value="6">Smartwatches</option>
                            <option value="7">Gaming</option>
                            <option value="8">Cameras</option>
                        </select>
                    </div>
                    <div class="col-md-6"><label class="form-label-dark">Stock</label><input type="number"
                            class="form-control-dark w-100" id="apStock" placeholder="50"></div>
                    <div class="col-12"><label class="form-label-dark">Description</label><textarea
                            class="form-control-dark w-100" id="apDesc" rows="3"
                            placeholder="Describe your product..."></textarea></div>
                    <div class="col-12"><label class="form-label-dark">Product Image</label><input type="file"
                            class="form-control-dark w-100" id="apImage" accept="image/*"></div>
                    <div class="col-12"><button class="btn btn-gradient" onclick="addProduct()"><i
                                class="bi bi-plus-circle"></i> Add Product</button></div>
                </div>
            </div>
        </div>

        <!-- Orders -->
        <div class="dash-section" id="sec-orders">
            <h2 style="font-weight:800;margin-bottom:24px;">Orders</h2>
            <div id="vendorOrdersList">
                <p class="text-muted">Loading...</p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Auth check — only vendors allowed
        if (!ApiClient.isLoggedIn() || ApiClient.getUser()?.role !== 'vendor') {
            window.location.href = 'login.html';
        }

        function showSection(id, el) {
            document.querySelectorAll('.dash-section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.dash-nav a').forEach(a => a.classList.remove('active'));
            if (el) el.classList.add('active');
            if (id === 'overview') loadDashboard();
            if (id === 'my-products') loadVendorProducts();
            if (id === 'orders') loadVendorOrders();
        }

        async function loadDashboard() {
            try {
                const stats = await ApiClient.getVendorStats();
                document.getElementById('totalRevenue').textContent = `₹${formatPrice(stats.totalRevenue)}`;
                document.getElementById('totalOrders').textContent = stats.totalOrders;
                document.getElementById('totalProducts').textContent = stats.totalProducts;

                if (stats.recentOrders && stats.recentOrders.length > 0) {
                    document.getElementById('recentOrdersList').innerHTML = `<table class="dash-table"><thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>${stats.recentOrders.map(o => `<tr><td>#${o.id}</td><td>${o.customer_name}</td><td>₹${formatPrice(o.total)}</td><td><span class="status-badge ${o.status}">${o.status}</span></td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>`;
                } else {
                    document.getElementById('recentOrdersList').innerHTML = '<p class="text-muted">No orders yet.</p>';
                }
            } catch (e) { showToast('Failed to load dashboard.', 'error'); }
        }

        /**
         * Load ONLY this vendor's own products via /vendor/my-products
         */
        async function loadVendorProducts() {
            try {
                const products = await ApiClient.getMyProducts();
                if (!products || products.length === 0) {
                    document.getElementById('vendorProducts').innerHTML = '<p class="text-muted">No products yet. Add your first product!</p>';
                    return;
                }
                document.getElementById('vendorProducts').innerHTML = `<table class="dash-table"><thead><tr><th>Product</th><th>Price</th><th>Stock</th><th>Rating</th><th>Actions</th></tr></thead><tbody>${products.map(p => `<tr><td style="font-weight:600;">${p.name}</td><td>₹${formatPrice(p.price)}</td><td>${p.stock}</td><td>${p.rating ? p.rating + '★' : 'N/A'}</td><td><button class="btn btn-ghost btn-sm" onclick="deleteProduct(${p.id})" title="Delete"><i class="bi bi-trash3"></i></button></td></tr>`).join('')}</tbody></table>`;
            } catch (e) { showToast('Failed to load products.', 'error'); }
        }

        async function loadVendorOrders() {
            try {
                const orders = await ApiClient.getVendorOrders();
                if (orders.length === 0) {
                    document.getElementById('vendorOrdersList').innerHTML = '<p class="text-muted">No orders yet.</p>';
                    return;
                }
                document.getElementById('vendorOrdersList').innerHTML = `<table class="dash-table"><thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>${orders.map(o => `<tr><td>#${o.id}</td><td>${o.customer_name}</td><td>${o.items?.length || 0} items</td><td>₹${formatPrice(o.total)}</td><td><span class="status-badge ${o.status}">${o.status}</span></td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>`;
            } catch (e) { showToast('Failed to load orders.', 'error'); }
        }

        async function addProduct() {
            try {
                const formData = new FormData();
                formData.append('name', document.getElementById('apName').value);
                formData.append('price', document.getElementById('apPrice').value);
                formData.append('compare_price', document.getElementById('apComparePrice').value);
                formData.append('category_id', document.getElementById('apCategory').value);
                formData.append('stock', document.getElementById('apStock').value);
                formData.append('description', document.getElementById('apDesc').value);
                const imageFile = document.getElementById('apImage').files[0];
                if (imageFile) formData.append('image', imageFile);

                if (!formData.get('name') || !formData.get('price')) { showToast('Name and price are required.', 'warning'); return; }

                await ApiClient.createProduct(formData);
                showToast('Product added successfully!', 'success');
                ['apName', 'apPrice', 'apComparePrice', 'apStock', 'apDesc'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('apImage').value = '';
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            try { await ApiClient.deleteProduct(id); showToast('Product deleted.', 'success'); loadVendorProducts(); }
            catch (e) { showToast(e.message, 'error'); }
        }

        loadDashboard();
    </script>
</body>

</html>
