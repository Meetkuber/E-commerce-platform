<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — NexMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .cart-page { padding: 120px 0 80px; min-height: 80vh; }
        .cart-item { display: flex; align-items: center; gap: 20px; padding: 24px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); margin-bottom: 16px; transition: all var(--transition-fast); }
        .cart-item:hover { border-color: var(--border-color-hover); }
        .cart-item .item-image { width: 100px; height: 100px; border-radius: var(--radius-md); overflow: hidden; flex-shrink: 0; background: var(--bg-card); }
        .cart-item .item-image img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item .item-info { flex: 1; }
        .cart-item .item-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
        .cart-item .item-name a { color: var(--text-primary); }
        .cart-item .item-vendor { font-size: 0.8rem; color: var(--text-tertiary); }
        .cart-item .item-price { font-weight: 700; font-size: 1.1rem; min-width: 120px; text-align: right; }
        .cart-qty { display: flex; align-items: center; gap: 0; border: 1px solid var(--border-color); border-radius: var(--radius-sm); overflow: hidden; }
        .cart-qty button { background: var(--bg-card); border: none; color: var(--text-primary); width: 36px; height: 36px; cursor: pointer; font-size: 1rem; }
        .cart-qty button:hover { background: var(--bg-card-hover); }
        .cart-qty span { width: 40px; text-align: center; font-weight: 600; font-size: 0.9rem; }
        .cart-remove { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 1.2rem; padding: 8px; transition: color var(--transition-fast); }
        .cart-remove:hover { color: var(--accent-danger); }
        .cart-summary { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 32px; position: sticky; top: 80px; }
        .cart-summary h4 { font-weight: 700; margin-bottom: 24px; }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 0.95rem; }
        .summary-row.total { border-top: 2px solid var(--border-color); padding-top: 16px; font-weight: 800; font-size: 1.2rem; }
        .empty-cart { text-align: center; padding: 80px 0; }
        .empty-cart i { font-size: 4rem; color: var(--text-tertiary); }
        .empty-cart h3 { margin: 20px 0 12px; font-weight: 700; }
        .empty-cart p { color: var(--text-secondary); }
        @media (max-width: 768px) { .cart-item { flex-wrap: wrap; } .cart-item .item-price { width: 100%; text-align: left; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">NexMart</a>
            <div class="d-flex align-items-center gap-3">
                <a href="products.html" class="nav-link"><i class="bi bi-arrow-left"></i> Continue Shopping</a>
                <div id="navAuthArea"><a href="login.html" class="btn nav-cta btn-sm">Sign In</a></div>
            </div>
        </div>
    </nav>

    <section class="cart-page">
        <div class="container">
            <h1 class="display-md mb-4"><i class="bi bi-bag"></i> Shopping Cart</h1>
            <div class="row" id="cartContent">
                <div class="col-12 text-center py-5"><div class="spinner mx-auto"></div></div>
            </div>
        </div>
    </section>
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadCart() {
            if (!ApiClient.isLoggedIn()) {
                document.getElementById('cartContent').innerHTML = '<div class="empty-cart"><i class="bi bi-person-lock"></i><h3>Please sign in</h3><p>You need to be logged in to view your cart.</p><a href="login.html" class="btn btn-gradient mt-3">Sign In</a></div>';
                return;
            }
            try {
                const cart = await ApiClient.getCart();
                if (!cart.items || cart.items.length === 0) {
                    document.getElementById('cartContent').innerHTML = '<div class="empty-cart"><i class="bi bi-bag-x"></i><h3>Your cart is empty</h3><p>Looks like you haven\'t added anything yet.</p><a href="products.html" class="btn btn-ghost mt-3">Start Shopping</a></div>';
                    return;
                }

                const itemsHtml = cart.items.map(item => {
                    const imgUrl = item.image && !item.image.includes('undefined') ? item.image : `https://placehold.co/100x100/1c1c1e/6e6e73?text=Product`;
                    return `
                    <div class="cart-item" id="cartItem${item.id}">
                        <div class="item-image"><img src="${imgUrl}" alt="${item.name}" onerror="this.src='https://placehold.co/100x100/1c1c1e/6e6e73?text=Product'"></div>
                        <div class="item-info">
                            <div class="item-name"><a href="product-detail.html?id=${item.product_id}">${item.name}</a></div>
                            <div class="item-vendor">by ${item.store_name}</div>
                        </div>
                        <div class="cart-qty">
                            <button onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
                        </div>
                        <div class="item-price">₹${formatPrice(item.price * item.quantity)}</div>
                        <button class="cart-remove" onclick="removeItem(${item.id})"><i class="bi bi-trash3"></i></button>
                    </div>`;
                }).join('');

                document.getElementById('cartContent').innerHTML = `
                    <div class="col-lg-8">${itemsHtml}</div>
                    <div class="col-lg-4">
                        <div class="cart-summary">
                            <h4>Order Summary</h4>
                            <div class="summary-row"><span>Subtotal (${cart.itemCount} items)</span><span>₹${formatPrice(cart.subtotal)}</span></div>
                            <div class="summary-row"><span>Shipping</span><span style="color:var(--accent-success)">Free</span></div>
                            <div class="summary-row"><span>Tax</span><span>Calculated at checkout</span></div>
                            <div class="summary-row total"><span>Total</span><span>₹${formatPrice(cart.subtotal)}</span></div>
                            <a href="checkout.html" class="btn btn-gradient w-100 mt-4"><i class="bi bi-lock"></i> Proceed to Checkout</a>
                            <a href="products.html" class="btn btn-ghost w-100 mt-2">Continue Shopping</a>
                        </div>
                    </div>`;
            } catch (e) {
                document.getElementById('cartContent').innerHTML = '<div class="text-center py-5"><p class="text-muted">Failed to load cart.</p></div>';
            }
        }

        async function updateQty(itemId, qty) {
            try {
                if (qty <= 0) { await ApiClient.removeFromCart(itemId); } else { await ApiClient.updateCartItem(itemId, qty); }
                loadCart(); updateCartBadge();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function removeItem(itemId) {
            try { await ApiClient.removeFromCart(itemId); showToast('Item removed.', 'success'); loadCart(); updateCartBadge(); }
            catch (e) { showToast(e.message, 'error'); }
        }

        loadCart();
    </script>
</body>
</html>
